<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Visão de Quadra - Register</title>

    <link rel="icon" href="/favicon.ico" sizes="64"/>
    <link rel="stylesheet" href="../../styles/output.css">
    <link rel="stylesheet" href="../../styles/animations.css">
    <link rel="stylesheet" href="../../styles/globals.css">
    <link rel="stylesheet" href="./register.css">

    <script type="module" src="../../main.js"></script>
</head>
<body>
    <main class="page-enter">
        <div class="section-container flex flex-col justify-center items-center gap-8">
            <div class="logo-container">
                <img src="../../assets/images/logo-vdq.png" alt="Visão de Quadra Logo" class="logo-image w-18 h-18">
            </div>
            <div class="section-content">
                <h1 class="text-3xl font-bold mb-6">Registre sua conta</h1>
                <p class="font-medium text-center">Insira seus principais dados para que possamos criar seu perfil e iniciar sua experiência.</p>

                <form class="flex flex-col justify-center items-center gap-4 mt-6 w-[24rem]">
                    <app-form-input type="text" name="name" placeholder="Insira seu nome" required></app-form-input>
                    <app-form-input type="email" name="email" placeholder="Insira seu email" required></app-form-input>
                    <app-form-input type="password" name="password" placeholder="Insira sua senha" required></app-form-input>
                    <div class="flex space-between gap-4 w-full">
                        <app-date-input date="birthdate" placeholder="Insira sua data de nascimento">
                            <img
                                slot="icon"
                                src="https://img.icons8.com/272727/shadow/32/tear-off-calendar.png"
                                alt=""
                            >
                        </app-date-input>
                        <app-select-input name="state"></app-select-input>
                    </div>
                    <fieldset class="gap-4 flex">
                        <label class="label"><input type="radio" name="sexo" value="Masc" checked class="input">Masculino</label>
                        <label class="label"><input type="radio" name="sexo" value="Fem" checked class="input" checked>Feminino</label>
                        <label class="label"><input type="radio" name="sexo" value="Outro" checked class="input">Outro</label>
                    </fieldset>

                    <app-button-primary type="submit" class="w-full">Registrar</app-button-primary>
                </form>
            </div>
            
        </div>
    </main>
</body>
</html>
